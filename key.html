<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAKDU Vendor GENKEY v9.46</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --soft: #1f2937;
      --line: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --brand: #800000;
      --ok: #16a34a;
      --warn: #f59e0b;
      --danger: #dc2626;
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(128,0,0,0.25), transparent 30%),
        linear-gradient(180deg, #0b1220 0%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    .card {
      background: rgba(17,24,39,0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .head {
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .title { font-size: 22px; font-weight: 900; letter-spacing: .3px; }
    .sub { color: var(--muted); font-size: 13px; }
    .body { padding: 20px; display: grid; gap: 18px; }
    .grid { display: grid; gap: 14px; grid-template-columns: repeat(2, minmax(0,1fr)); }
    .full { grid-column: 1 / -1; }
    .field { display: grid; gap: 8px; }
    label { font-size: 13px; color: #e5e7eb; font-weight: 700; }
    input, select, textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
      font-size: 14px;
    }
    textarea { min-height: 180px; resize: vertical; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 900;
      cursor: pointer;
      color: white;
      background: var(--soft);
    }
    .primary { background: linear-gradient(135deg, #7f1d1d, #991b1b); }
    .ok { background: linear-gradient(135deg, #166534, #16a34a); }
    .warn { background: linear-gradient(135deg, #b45309, #f59e0b); }
    .ghost { background: rgba(255,255,255,0.06); }
    .meta {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(3, minmax(0,1fr));
    }
    .pill {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px;
    }
    .pill b { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .status {
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
    }
    .status.ok { color: #bbf7d0; border-color: rgba(34,197,94,0.35); background: rgba(22,163,74,0.10); }
    .status.err { color: #fecaca; border-color: rgba(239,68,68,0.35); background: rgba(220,38,38,0.10); }
    .muted { color: var(--muted); font-size: 12px; line-height: 1.6; }
    .split { display: grid; gap: 18px; grid-template-columns: 1.2fr 0.8fr; }
    @media (max-width: 860px) {
      .grid, .meta, .split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div>
          <div class="title">FAKDU GENKEY</div>
          <div class="sub">ไฟล์ส่วนตัวสำหรับเจ้าของระบบเท่านั้น</div>
        </div>
        <div class="sub">v9.46</div>
      </div>

      <div class="body">
        <div id="statusBox" class="status">พร้อมใช้งาน</div>

        <div class="split">
          <div class="grid">
            <div class="field">
              <label>Shop ID / รหัสร้าน</label>
              <input id="shopId" placeholder="เช่น SHOP-ABC12345" autocomplete="off" />
            </div>

            <div class="field">
              <label>Plan</label>
              <select id="plan">
                <option value="PRO">PRO</option>
                <option value="LIFETIME">LIFETIME</option>
                <option value="PREMIUM">PREMIUM</option>
              </select>
            </div>

            <div class="field">
              <label>Features</label>
              <input id="features" value="pro" placeholder="เช่น pro,sync,analytics" />
            </div>

            <div class="field">
              <label>หมายเหตุ</label>
              <input id="note" placeholder="เช่น ร้านหลัก / เปิดโปรครั้งแรก" />
            </div>

            <div class="field full">
              <label>VAULT SECRET (ต้องตรงกับ vault.js)</label>
              <input id="secret" value="FAKDU_VAULT_MASTER_SECRET_V946_CHANGE_ME" />
            </div>

            <div class="field full">
              <label>GENKEY</label>
              <textarea id="genkey" placeholder="คีย์ปลดล็อกจะออกที่นี่" readonly></textarea>
            </div>

            <div class="row full">
              <button id="btnGenerate" class="primary">เจน GENKEY</button>
              <button id="btnVerify" class="ok">ตรวจคีย์</button>
              <button id="btnCopy" class="ghost">คัดลอกคีย์</button>
              <button id="btnClear" class="warn">ล้างข้อมูล</button>
            </div>
          </div>

          <div class="grid">
            <div class="pill">
              <b>Prefix</b>
              <span id="metaPrefix">FKG1</span>
            </div>
            <div class="pill">
              <b>License ID</b>
              <span id="metaLicenseId">-</span>
            </div>
            <div class="pill">
              <b>Issued At</b>
              <span id="metaIssuedAt">-</span>
            </div>
            <div class="pill full">
              <b>Payload Preview</b>
              <textarea id="payloadPreview" readonly style="min-height:220px"></textarea>
            </div>
          </div>
        </div>

        <div class="muted">
          ใช้ไฟล์นี้เฉพาะฝั่งคุณเท่านั้น ลูกค้าไม่ควรเห็นไฟล์นี้ และค่า <b>VAULT SECRET</b> ต้องตรงกับไฟล์ <b>vault.js</b> ที่ใช้ในแอป ไม่งั้น GENKEY จะตรวจไม่ผ่าน
        </div>
      </div>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      const APP_VERSION = '9.46';
      const GENKEY_PREFIX = 'FKG1';

      const els = {
        shopId: document.getElementById('shopId'),
        plan: document.getElementById('plan'),
        features: document.getElementById('features'),
        note: document.getElementById('note'),
        secret: document.getElementById('secret'),
        genkey: document.getElementById('genkey'),
        payloadPreview: document.getElementById('payloadPreview'),
        statusBox: document.getElementById('statusBox'),
        metaPrefix: document.getElementById('metaPrefix'),
        metaLicenseId: document.getElementById('metaLicenseId'),
        metaIssuedAt: document.getElementById('metaIssuedAt'),
        btnGenerate: document.getElementById('btnGenerate'),
        btnVerify: document.getElementById('btnVerify'),
        btnCopy: document.getElementById('btnCopy'),
        btnClear: document.getElementById('btnClear')
      };

      function normalizeShopId(value = '') {
        return String(value || '')
          .trim()
          .toUpperCase()
          .replace(/[^A-Z0-9_-]/g, '-');
      }

      function randomString(len = 10) {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let out = '';
        for (let i = 0; i < len; i += 1) {
          out += chars[Math.floor(Math.random() * chars.length)];
        }
        return out;
      }

      function makeId(prefix = 'LIC', len = 10) {
        return `${prefix}-${randomString(len)}`;
      }

      function toBase64Url(input) {
        const bytes = new TextEncoder().encode(String(input || ''));
        let binary = '';
        bytes.forEach((byte) => {
          binary += String.fromCharCode(byte);
        });
        return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
      }

      function fromBase64Url(input) {
        const base64 = String(input || '')
          .replace(/-/g, '+')
          .replace(/_/g, '/')
          .padEnd(Math.ceil(String(input || '').length / 4) * 4, '=');
        const binary = atob(base64);
        const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      }

      async function sha256Hex(message) {
        const bytes = new TextEncoder().encode(String(message || ''));
        const hashBuffer = await crypto.subtle.digest('SHA-256', bytes);
        return Array.from(new Uint8Array(hashBuffer))
          .map((byte) => byte.toString(16).padStart(2, '0'))
          .join('');
      }

      async function signToken(prefix, encodedPayload, secret) {
        return sha256Hex(`${secret}|${APP_VERSION}|${prefix}|${encodedPayload}`);
      }

      async function createToken(prefix, payload, secret) {
        const encoded = toBase64Url(JSON.stringify(payload));
        const signature = await signToken(prefix, encoded, secret);
        return `${prefix}.${encoded}.${signature}`;
      }

      async function readToken(token, secret) {
        const raw = String(token || '').trim();
        const parts = raw.split('.');
        if (parts.length !== 3) {
          return { ok: false, message: 'รูปแบบคีย์ไม่ถูกต้อง' };
        }
        const [prefix, encoded, signature] = parts;
        const expected = await signToken(prefix, encoded, secret);
        if (expected !== signature) {
          return { ok: false, message: 'ลายเซ็นไม่ตรง' };
        }
        try {
          const payload = JSON.parse(fromBase64Url(encoded));
          return { ok: true, prefix, payload };
        } catch (_) {
          return { ok: false, message: 'อ่าน payload ไม่สำเร็จ' };
        }
      }

      function setStatus(message, ok = true) {
        els.statusBox.textContent = message;
        els.statusBox.className = `status ${ok ? 'ok' : 'err'}`;
      }

      function buildPayload() {
        const shopId = normalizeShopId(els.shopId.value);
        const featureList = String(els.features.value || 'pro')
          .split(',')
          .map((v) => v.trim())
          .filter(Boolean);
        const issuedAt = Date.now();
        return {
          type: 'GENKEY',
          version: 1,
          appVersion: APP_VERSION,
          shopId,
          plan: String(els.plan.value || 'PRO').trim().toUpperCase(),
          features: featureList.length ? featureList : ['pro'],
          issuedAt,
          licenseId: makeId('LIC', 10),
          note: String(els.note.value || '').trim()
        };
      }

      async function generateKey() {
        try {
          const shopId = normalizeShopId(els.shopId.value);
          const secret = String(els.secret.value || '').trim();

          if (!shopId) {
            setStatus('กรุณากรอก Shop ID', false);
            els.shopId.focus();
            return;
          }
          if (!secret) {
            setStatus('กรุณากรอก VAULT SECRET', false);
            els.secret.focus();
            return;
          }

          const payload = buildPayload();
          const token = await createToken(GENKEY_PREFIX, payload, secret);

          els.genkey.value = token;
          els.payloadPreview.value = JSON.stringify(payload, null, 2);
          els.metaPrefix.textContent = GENKEY_PREFIX;
          els.metaLicenseId.textContent = payload.licenseId;
          els.metaIssuedAt.textContent = new Date(payload.issuedAt).toLocaleString('th-TH');
          setStatus('เจน GENKEY สำเร็จ');
        } catch (err) {
          console.error(err);
          setStatus('เจน GENKEY ไม่สำเร็จ', false);
        }
      }

      async function verifyKey() {
        try {
          const token = String(els.genkey.value || '').trim();
          const secret = String(els.secret.value || '').trim();
          const shopId = normalizeShopId(els.shopId.value);

          if (!token) {
            setStatus('ยังไม่มี GENKEY ให้ตรวจ', false);
            return;
          }
          if (!secret) {
            setStatus('กรุณากรอก VAULT SECRET', false);
            return;
          }

          const info = await readToken(token, secret);
          if (!info.ok) {
            setStatus(info.message || 'คีย์ไม่ผ่าน', false);
            return;
          }
          if (info.prefix !== GENKEY_PREFIX) {
            setStatus('คีย์นี้ไม่ใช่ GENKEY', false);
            return;
          }
          if (normalizeShopId(info.payload?.shopId) !== shopId) {
            setStatus('คีย์นี้ไม่ตรงกับ Shop ID ที่กรอก', false);
            return;
          }

          els.payloadPreview.value = JSON.stringify(info.payload || {}, null, 2);
          els.metaPrefix.textContent = info.prefix;
          els.metaLicenseId.textContent = info.payload?.licenseId || '-';
          els.metaIssuedAt.textContent = info.payload?.issuedAt
            ? new Date(info.payload.issuedAt).toLocaleString('th-TH')
            : '-';
          setStatus('ตรวจ GENKEY ผ่าน');
        } catch (err) {
          console.error(err);
          setStatus('ตรวจ GENKEY ไม่สำเร็จ', false);
        }
      }

      async function copyKey() {
        const token = String(els.genkey.value || '').trim();
        if (!token) {
          setStatus('ยังไม่มี GENKEY ให้คัดลอก', false);
          return;
        }
        try {
          await navigator.clipboard.writeText(token);
          setStatus('คัดลอก GENKEY แล้ว');
        } catch (_) {
          els.genkey.select();
          document.execCommand('copy');
          setStatus('คัดลอก GENKEY แล้ว');
        }
      }

      function clearAll() {
        els.shopId.value = '';
        els.features.value = 'pro';
        els.note.value = '';
        els.genkey.value = '';
        els.payloadPreview.value = '';
        els.metaPrefix.textContent = GENKEY_PREFIX;
        els.metaLicenseId.textContent = '-';
        els.metaIssuedAt.textContent = '-';
        setStatus('ล้างข้อมูลแล้ว');
      }

      els.btnGenerate.addEventListener('click', generateKey);
      els.btnVerify.addEventListener('click', verifyKey);
      els.btnCopy.addEventListener('click', copyKey);
      els.btnClear.addEventListener('click', clearAll);
      els.shopId.addEventListener('change', () => {
        els.shopId.value = normalizeShopId(els.shopId.value);
      });

      setStatus('พร้อมใช้งาน');
    })();
  </script>
</body>
</html>
